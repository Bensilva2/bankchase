apiVersion: v1
kind: Secret
metadata:
  name: bankchase-secrets
  namespace: bankchase
type: Opaque
stringData:
  # Database credentials - CHANGE THESE IN PRODUCTION
  DATABASE_URL: "postgresql://user:password@postgres:5432/bankchase"
  
  # JWT and security tokens
  JWT_SECRET: "your-jwt-secret-key-change-in-production"
  SETUP_TOKEN: "your-setup-token-change-in-production"
  
  # API keys
  STRIPE_SECRET_KEY: "sk_live_your-key-here"
  SENDGRID_API_KEY: "your-sendgrid-key"
