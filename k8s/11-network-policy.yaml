apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: bankchase-default-deny
  namespace: bankchase
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: bankchase-backend-allow
  namespace: bankchase
spec:
  podSelector:
    matchLabels:
      app: bankchase-backend
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8000
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 5432  # PostgreSQL
  - to:
    - podSelector:
        matchLabels:
          app: bankchase-backend

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: bankchase-frontend-allow
  namespace: bankchase
spec:
  podSelector:
    matchLabels:
      app: bankchase-frontend
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 3000
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: bankchase-backend
    ports:
    - protocol: TCP
      port: 8000
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
