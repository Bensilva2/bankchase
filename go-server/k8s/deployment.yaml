apiVersion: apps/v1
kind: Deployment
metadata:
  name: bankchase-server
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: bankchase-server
  template:
    metadata:
      labels:
        app: bankchase-server
        version: v1
    spec:
      containers:
      - name: bankchase-server
        image: bankchase-server:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        
        # Environment variables
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: PORT
          value: "8080"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: bankchase-secrets
              key: database-url
        - name: UPSTASH_REDIS_REST_URL
          valueFrom:
            secretKeyRef:
              name: bankchase-secrets
              key: redis-url
        - name: CURRENCYCLOUD_API_KEY
          valueFrom:
            secretKeyRef:
              name: bankchase-secrets
              key: currencycloud-api-key
        - name: CURRENCYCLOUD_API_SECRET
          valueFrom:
            secretKeyRef:
              name: bankchase-secrets
              key: currencycloud-api-secret
        - name: WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: bankchase-secrets
              key: webhook-secret
        
        # Health checks
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        
        # Resource requests/limits
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        
        # Security context
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      
      # Pod security context
      securityContext:
        fsGroup: 1000
      
      # Service account
      serviceAccountName: bankchase-server
      
      # Pod disruption budget
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - bankchase-server
              topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: bankchase-server
  namespace: default
  labels:
    app: bankchase-server
spec:
  type: LoadBalancer
  selector:
    app: bankchase-server
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bankchase-server-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bankchase-server
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bankchase-server
  namespace: default

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: bankchase-server
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bankchase-server
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: bankchase-server
subjects:
- kind: ServiceAccount
  name: bankchase-server
  namespace: default
